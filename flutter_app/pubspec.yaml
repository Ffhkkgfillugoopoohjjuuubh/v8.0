name: echo_ai
description: Echo AI - Educational AI App with OCR and multilingual support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # TTS
  flutter_tts: ^4.0.2

  # OCR
  google_mlkit_text_recognition: ^0.13.0

  # Image
  image_picker: ^1.1.2

  # Storage
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.4.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
