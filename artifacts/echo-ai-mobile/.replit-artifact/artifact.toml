kind = "mobile"
previewPath = "/echo-ai-mobile/"
title = "Echo AI Mobile"
version = "1.0.0"
id = "artifacts/echo-ai-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/echo-ai-mobile/" ]
localPort = 24161

[services.development]
run = "pnpm --filter @workspace/echo-ai-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echo-ai-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/echo-ai-mobile", "run", "serve" ]

[services.env]
PORT = "24161"
BASE_PATH = "/echo-ai-mobile/"
